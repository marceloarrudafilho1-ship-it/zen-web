<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zen — crypto wallet investigation, every chain</title>
  <meta name="description" content="Web-based crypto wallet investigation. Trace flows across EVM and Solana, label counterparties, follow the money, resolve identities. Invite-only." />
  <meta name="theme-color" content="#0a0a0b" />
  <link rel="icon" href="assets/zen-logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="nav">
    <a class="brand" href="#" aria-label="Zen home">
      <svg class="brand__mark" viewBox="0 0 256 256" aria-hidden="true">
        <defs>
          <linearGradient id="brandG" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fb7185"/>
            <stop offset="1" stop-color="#f472b6"/>
          </linearGradient>
        </defs>
        <circle cx="128" cy="128" r="120" fill="none" stroke="url(#brandG)" stroke-width="12"/>
        <path d="M82 92 L174 92 L82 164 L174 164" stroke="url(#brandG)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="brand__word">Zen</span>
      <span class="brand__tag">web preview</span>
    </a>

    <nav class="nav__links" aria-label="Primary">
      <a href="#features">Features</a>
      <a href="#how">How it works</a>
      <a href="#trust">Security</a>
    </nav>

    <a class="btn btn--ghost nav__cta" href="/app">
      <span>Sign in</span>
      <span class="btn__ico" aria-hidden="true">↗</span>
    </a>
  </header>

  <main class="mini">
    <section class="mini-hero">
      <h1 class="mini-hero__title" data-stagger="1">
        Follow the money.<br/>
        <span class="hero__title-2">Across every chain.</span>
      </h1>
      <p class="mini-hero__sub" data-stagger="2">
        Browser-based crypto wallet investigation. Multi-chain. Invite-only.
      </p>
      <a class="btn btn--primary mini-hero__cta" href="/app" data-stagger="3">
        <span>Launch web app</span>
        <span class="btn__kbd" aria-hidden="true">→</span>
      </a>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
